{% extends 'schedule/base.html' %}

{% block title %}Страница не найдена{% endblock %}

{% block content %}
<main class="content" style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
    <div style="text-align:center;max-width:400px;">
        <div style="font-size:5rem;font-weight:800;color:var(--border);line-height:1;margin-bottom:1rem;font-family:'JetBrains Mono',monospace;">404</div>
        <h1 style="font-size:1.3rem;font-weight:600;color:var(--text);margin-bottom:0.5rem;">Страница не найдена</h1>
        <p style="color:var(--text-2);font-size:0.9rem;margin-bottom:1.5rem;">Запрашиваемая страница не существует или была перемещена.</p>
        <a href="{% url 'schedule:group_list' %}" class="back-link" style="justify-content:center;">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            На главную
        </a>
    </div>
</main>
{% endblock %}
